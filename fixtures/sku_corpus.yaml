# Known-good SKU corpus for regression testing.
#
# When `update_lifecycle.py test` runs, it normalizes each SKU below and
# verifies the matcher's classification matches the expected bucket.
# This catches accidental regex changes that would silently misclassify
# real customer line items.
#
# Add new SKUs here whenever you encounter them in the wild.

