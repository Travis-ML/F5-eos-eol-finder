# F5 hardware product lifecycle data.
#
# Source of truth: F5 K4309 (https://my.f5.com/manage/s/article/K4309).
# Dates seeded from F5's published lifecycle matrix as cross-referenced by
# WorldTech IT's End-of-Life Matrix (https://wtit.com/f5-networks-end-of-life-hardware-rma-technical-software-support/).
# Verify against K4309 quarterly. F5 may revise dates.
#
# Schema:
#   data_revision: ISO date the data was last reviewed/updated
#   families: list of hardware families with lifecycle dates and SKU patterns
#     family_id    - short stable identifier
#     display_name - human-readable platform name
#     hw_code      - F5's hardware platform code (e.g. C117), if known
#     status       - "regular" | "eos_announced" | "eosd" | "eots" | "regular_no_eos"
#     end_of_sale, end_of_software_dev, end_of_technical_support, end_of_rma:
#                  ISO YYYY-MM-DD or null if not announced
#     sku_patterns - regex patterns (anchored, case-insensitive) that match
#                    F5 SKUs known to belong to this family
#     notes        - free text shown to the user
#
# Service / billing / virtual SKUs that have no hardware EoL of their own
# are matched by `non_hardware_patterns` at the bottom of this file.

