# SKUs that match these patterns are recognized as F5-related but are not
# hardware platforms with their own lifecycle dates. They are annotated
# with a category instead of dates so the user can see they were not skipped.
non_hardware_patterns:
  - category: Service contract
    note: Service SKU — covers a separate hardware platform; lifecycle follows the covered product.
    patterns:
      - '^F5-SVC-'

  - category: Add-on / chassis option
    note: Add-on license — lifecycle follows the host platform.
    patterns:
      - '^F5-ADD-VPR-'
      - '^F5-ADD-FIPS'

  - category: Virtual Edition (software)
    note: BIG-IP VE is software; lifecycle is governed by software version, not hardware EoL.
    patterns:
      - '^F5-BIG-.*-VE(-.*)?$'
      - '^F5-BIG-LTM-VE-'
      - '^F5-BT-.*-BUNDLE$'
      - '^F5-BIG-MSP-'
      - '^F5-BIG-SPTUS'

  - category: BIG-IQ (management software)
    note: BIG-IQ is software; lifecycle is governed by software version, not hardware EoL.
    patterns:
      - '^F5-BIQ-'

  - category: ELA / billing line
    note: Enterprise License Agreement billing line — no lifecycle.
    patterns:
      - '^F5-ELA-'

  - category: Consulting / professional services
    note: Consulting line — no lifecycle.
    patterns:
      - '^F5-CST-'
